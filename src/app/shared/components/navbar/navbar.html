<nav class="nav">
  <div class="nav__inner container">
    <a routerLink="/" class="brand" (click)="closeMobile()">
      <span class="brand__mark">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <rect x="18" y="20" width="28" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="3.5" />
          <path d="M20 24 L32 33 L44 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <span class="brand__text">Invite<b>Studio</b></span>
    </a>

    <button class="nav__burger" (click)="toggleMobile()" aria-label="תפריט">
      <span></span><span></span><span></span>
    </button>

    <div class="nav__links" [class.is-open]="mobileOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobile()">בית</a>
      <a routerLink="/templates" routerLinkActive="active" (click)="closeMobile()">תבניות</a>
      <a routerLink="/editor" routerLinkActive="active" (click)="closeMobile()">עורך</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/my-designs" routerLinkActive="active" (click)="closeMobile()">העיצובים שלי</a>
      }

      <div class="nav__cta">
        @if (!auth.isLoggedIn()) {
          <app-button variant="ghost" size="sm" link="/login">התחברות</app-button>
          <app-button variant="primary" size="sm" link="/register">הרשמה</app-button>
        } @else {
          <div class="usermenu">
            <button class="usermenu__btn" (click)="toggleMenu()">
              <span class="usermenu__avatar">{{ initials(auth.user()!.displayName) }}</span>
              <span class="usermenu__name">{{ auth.user()!.displayName }}</span>
              <span class="usermenu__chev">▾</span>
            </button>
            @if (menuOpen()) {
              <div class="usermenu__pop">
                <a routerLink="/profile" (click)="toggleMenu(); closeMobile()">הפרופיל שלי</a>
                <a routerLink="/my-designs" (click)="toggleMenu(); closeMobile()">העיצובים שלי</a>
                <button (click)="logout()">התנתקות</button>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</nav>
