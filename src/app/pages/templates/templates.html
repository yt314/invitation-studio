<section class="page-head">
  <div class="container">
    <span class="eyebrow">גלריית תבניות</span>
    <h1>בחרו תבנית ותתחילו לעצב</h1>
    <p>תבניות מוכנות ומעוצבות לכל סוג אירוע. לחיצה אחת ואתם בעורך.</p>
  </div>
</section>

<div class="container">
  <div class="filters">
    @for (f of filters(); track f.id) {
      <button
        class="chip"
        [class.is-active]="active() === f.id"
        (click)="setFilter(f.id)"
      >
        {{ f.label }}
      </button>
    }
  </div>

  @if (visible().length) {
    <div class="grid">
      @for (t of visible(); track t.id) {
        <app-template-card [template]="t" />
      }
    </div>
  } @else {
    <div class="empty">
      <span class="empty__icon">🔍</span>
      <h3>אין תבניות בקטגוריה זו עדיין</h3>
      <p>נסו קטגוריה אחרת — בקרוב נוסיף עוד תבניות.</p>
    </div>
  }
</div>
