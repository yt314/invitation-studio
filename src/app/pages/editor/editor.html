@if (loading()) {
  <div class="ed__loading">
    <div class="ed__loading-ring"></div>
    <p>טוען את העיצוב…</p>
  </div>
}

<div class="ed">
  <!-- Top bar -->
  <header class="ed__top">
    <div class="ed__top-side">
      <a routerLink="/" class="ed__logo" title="חזרה לבית">
        <span>Invite<b>Studio</b></span>
      </a>
      <input
        class="ed__title"
        [value]="state.design().title"
        (input)="state.setTitle($any($event.target).value)"
        aria-label="שם העיצוב"
      />
    </div>

    <div class="ed__top-actions">
      @if (currentId()) {
        <button class="ed__act ed__act--ghost" (click)="saveCopy()" [disabled]="saving()">⧉ עותק</button>
      }
      <button class="ed__act ed__act--ghost" (click)="save()" [disabled]="saving()">
        {{ saving() ? '… שומר' : (currentId() ? '💾 עדכון' : '💾 שמירה') }}
      </button>
      <button class="ed__act ed__act--primary" (click)="openDownload()">⬇ הורדה</button>
    </div>
  </header>

  <div class="ed__body">
    <app-editor-toolbar
      class="ed__rail"
      [tab]="tab()"
      (tabChange)="setTab($event)"
      (reset)="resetOpen.set(true)"
    />

    <aside class="ed__panel">
      <app-assets-panel [tab]="tab()" />
    </aside>

    <main class="ed__stage">
      <div class="ed__canvas-wrap">
        <div class="ed__canvas">
          <app-canvas-editor />
        </div>
      </div>
      <p class="ed__hint">טיפ: גררו אלמנטים, שנו גודל מהפינות, ומחקו עם מקש Delete</p>
    </main>

    <aside class="ed__right">
      <div class="ed__props">
        <app-properties-panel />
      </div>
      <div class="ed__layers">
        <app-layers-panel />
      </div>
    </aside>
  </div>
</div>

<app-download-dialog [design]="state.design()" [open]="downloadOpen()" (closed)="downloadOpen.set(false)" />

<app-modal [open]="resetOpen()" heading="איפוס העיצוב" (closed)="resetOpen.set(false)">
  <p>פעולה זו תחזיר את העיצוב למצב ההתחלתי שלו. כל השינויים שביצעתם יימחקו. להמשיך?</p>
  <div modal-footer>
    <app-button variant="danger" (pressed)="confirmReset()">כן, אפס</app-button>
    <app-button variant="ghost" (pressed)="resetOpen.set(false)">ביטול</app-button>
  </div>
</app-modal>
